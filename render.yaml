services:
  - type: web
    name: el-archivo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: el-archivo-db
          property: connectionString
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "1"

databases:
  - name: el-archivo-db
    databaseName: el_archivo
    plan: free
